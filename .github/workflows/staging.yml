name: staging

on:
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: read
  packages: write

jobs:
  types:
    uses: potber/.github/.github/workflows/npm_types.yml@v1

  lint:
    uses: potber/.github/.github/workflows/npm_lint.yml@v1

  test:
    uses: potber/.github/.github/workflows/npm_test-coverage.yml@v1

  release_image:
    needs:
    - types
    - lint
    - test
    permissions:
      contents: read
      packages: write
    uses: potber/.github/.github/workflows/docker_release_image.yml@v1
