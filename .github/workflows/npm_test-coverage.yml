name: npm-test-coverage

on:
  workflow_call:
    inputs:
      node-version-file:
        required: false
        type: string
        default: '.nvmrc'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
