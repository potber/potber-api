name: production

on:
  push:
    tags:
    - v*

permissions:
  contents: read
  packages: write

jobs:
  types:
    uses: ./.github/workflows/npm_types.yml
    with:
      node-version-file: .nvmrc

  lint:
    uses: ./.github/workflows/npm_lint.yml
    with:
      node-version-file: .nvmrc

  test:
    uses: ./.github/workflows/npm_test-coverage.yml
    with:
      node-version-file: .nvmrc

  release_image:
    needs:
    - types
    - lint
    - test
    permissions:
      contents: read
      packages: write
    uses: potber/.github/.github/workflows/release_image.yml@v1
    with:
      latest: true
